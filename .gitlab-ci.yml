stages:
  - lint
  - build
  - test

clippy-check:
  stage: lint
  tags:
    - adam-home-pc
  script: 
    - rustup component add clippy
    - cd NanoVNA-Saver
    - cargo clippy --all-targets --all-features -- -Dwarnings

rust-latest:
  stage: build
  tags:
    - adam-home-pc
  script:
    - cd NanoVNA-Saver
    - cargo build --verbose
    - cargo test --verbose

test:
  stage: test
  tags:
    - adam-home-pc
  script:
    - cd NanoVNA-Saver
    - cargo test --verbose
