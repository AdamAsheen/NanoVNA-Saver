stages:
  - lint
  - build
  - test

clippy-check:
  stage: lint
  image: rust:latest
  script: 
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -Dwarnings

rust-latest:
  stage: build
  image: rust:latest
  script:
    - cd NanoVNA-Saver
    - cargo build --verbose
    - cargo test --verbose

rust-nightly:
  stage: build
  image: rustlang/rust:nightly
  script:
    - cd NanoVNA-Saver
    - cargo build --verbose
    - cargo test --verbose
  allow_failure: true

test:
  stage: test
  image: rust:latest
  script:
    - cd NanoVNA-Saver
    - cargo test --verbose
